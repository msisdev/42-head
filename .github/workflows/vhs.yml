name: vhs
on:
  push:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/Makefile'
      - '**/*.tape'
      - '.github/workflows/vhs.yml'
jobs:
  vhs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Build projects
        run: |
          for dir in $(find . -name "*.tape" -exec dirname {} \; | sort -u); do
            if [ -f "$dir/Makefile" ]; then
              make -C "$dir"
            fi
          done
        
      - name: Create dummy tape for action
        run: touch vhs.tape

      # vhs-action이 설치만 하고 통과하도록 유도하기 위해 빈 vhs.tape를 둡니다.
      - uses: charmbracelet/vhs-action@v1

      - name: Remove dummy tape
        run: rm vhs.tape

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 설치된 vhs를 사용하여 모든 .tape 파일을 직접 찾아서 렌더링합니다.
      - name: Generate tapes
        run: |
          for tape in $(find . -name "*.tape"); do
            vhs "$tape"
          done

      - uses: stefanzweifel/git-auto-commit-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: Update generated VHS GIF
          branch: main
          commit_user_name: vhs-action 📼
          commit_user_email: actions@github.com
          commit_author: vhs-action 📼 <actions@github.com>
          file_pattern: '**/*.gif'
